<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live CCTV Monitoring - Missing Person System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        .alert-panel { background: #1a1a1a; color: white; border-radius: 10px; }
        .stream-card { border: 2px solid #ddd; border-radius: 10px; }
        .stream-active { border-color: #28a745; }
        .alert-item { border-left: 4px solid #dc3545; margin-bottom: 10px; }
        .confidence-high { color: #dc3545; font-weight: bold; }
        .confidence-medium { color: #ffc107; font-weight: bold; }
        .confidence-low { color: #28a745; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-video"></i> Live CCTV Monitoring
            </a>
            <div class="navbar-nav ms-auto">
                <span class="navbar-text me-3">
                    Status: <span id="connection-status" class="badge bg-secondary">Connecting...</span>
                </span>
                <a class="nav-link" href="/dashboard">Dashboard</a>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div class="row">
            <!-- Stream Controls -->
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header">
                        <h5><i class="fas fa-camera"></i> Stream Controls</h5>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">Stream ID</label>
                            <input type="text" class="form-control" id="stream-id" placeholder="e.g., camera-1">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Camera Source</label>
                            <input type="text" class="form-control" id="camera-source" placeholder="0 or rtsp://...">
                        </div>
                        <div class="d-grid gap-2">
                            <button class="btn btn-success" onclick="startStream()">
                                <i class="fas fa-play"></i> Start Stream
                            </button>
                            <button class="btn btn-danger" onclick="stopStream()">
                                <i class="fas fa-stop"></i> Stop Stream
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Active Streams -->
                <div class="card mt-3">
                    <div class="card-header">
                        <h6><i class="fas fa-list"></i> Active Streams</h6>
                    </div>
                    <div class="card-body">
                        <div id="active-streams">
                            <p class="text-muted">No active streams</p>
                        </div>
                    </div>
                </div>

                <!-- System Stats -->
                <div class="card mt-3">
                    <div class="card-header">
                        <h6><i class="fas fa-chart-bar"></i> System Stats</h6>
                    </div>
                    <div class="card-body">
                        <div id="system-stats">
                            <small class="text-muted">Loading...</small>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Real-Time Alerts -->
            <div class="col-md-8">
                <div class="alert-panel p-4">
                    <h4><i class="fas fa-exclamation-triangle text-warning"></i> Real-Time Alerts</h4>
                    <div id="alerts-container">
                        <div class="text-center text-muted mt-4">
                            <i class="fas fa-search fa-3x mb-3"></i>
                            <p>Monitoring for missing persons...</p>
                            <p><small>Alerts will appear here when matches are detected</small></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Alert Sound -->
    <audio id="alert-sound" preload="auto">
        <source src="data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhBSuBzvLZiTYIG2m98OScTgwOUarm7blmGgU7k9n1unEiBC13yO/eizEIHWq+8+OWT" type="audio/wav">
    </audio>

    <script>
        // WebSocket connection
        const socket = io();
        let alertCount = 0;

        // Connection status
        socket.on('connect', function() {
            document.getElementById('connection-status').textContent = 'Connected';
            document.getElementById('connection-status').className = 'badge bg-success';
            requestStreamStatus();
        });

        socket.on('disconnect', function() {
            document.getElementById('connection-status').textContent = 'Disconnected';
            document.getElementById('connection-status').className = 'badge bg-danger';
        });

        // Real-time alerts
        socket.on('real_time_alert', function(data) {
            showAlert(data);
            playAlertSound();
        });

        // Stream status updates
        socket.on('stream_status_update', function(data) {
            updateSystemStats(data);
        });

        socket.on('stream_started', function(data) {
            showNotification('Stream started: ' + data.stream_id, 'success');
            requestStreamStatus();
        });

        socket.on('stream_stopped', function(data) {
            showNotification('Stream stopped: ' + data.stream_id, 'info');
            requestStreamStatus();
        });

        function startStream() {
            const streamId = document.getElementById('stream-id').value;
            const source = document.getElementById('camera-source').value;

            if (!streamId || !source) {
                alert('Please enter both Stream ID and Camera Source');
                return;
            }

            fetch('/api/start-stream', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({stream_id: streamId, source: source})
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showNotification('Stream started successfully', 'success');
                } else {
                    showNotification('Failed to start stream: ' + data.message, 'danger');
                }
            });
        }

        function stopStream() {
            const streamId = document.getElementById('stream-id').value;
            if (!streamId) {
                alert('Please enter Stream ID');
                return;
            }

            fetch('/api/stop-stream', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({stream_id: streamId})
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showNotification('Stream stopped successfully', 'success');
                } else {
                    showNotification('Failed to stop stream: ' + data.message, 'danger');
                }
            });
        }

        function showAlert(alertData) {
            alertCount++;
            const alertsContainer = document.getElementById('alerts-container');
            
            if (alertCount === 1) {
                alertsContainer.innerHTML = '';
            }

            const confidenceClass = alertData.confidence > 80 ? 'confidence-high' : 
                                  alertData.confidence > 60 ? 'confidence-medium' : 'confidence-low';

            const alertHtml = `
                <div class="alert-item bg-dark p-3 rounded mb-2">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <h6 class="text-warning mb-1">
                                <i class="fas fa-user-circle"></i> ${alertData.person_name}
                            </h6>
                            <p class="mb-1">
                                <strong>Confidence:</strong> 
                                <span class="${confidenceClass}">${alertData.confidence}%</span>
                            </p>
                            <p class="mb-1">
                                <strong>Stream:</strong> ${alertData.stream_id}
                            </p>
                            <small class="text-muted">
                                <i class="fas fa-clock"></i> ${new Date(alertData.timestamp).toLocaleString()}
                            </small>
                        </div>
                        <div class="text-end">
                            <span class="badge bg-danger">MATCH FOUND</span>
                        </div>
                    </div>
                </div>
            `;

            alertsContainer.insertAdjacentHTML('afterbegin', alertHtml);
        }

        function playAlertSound() {
            const audio = document.getElementById('alert-sound');
            audio.play().catch(e => console.log('Could not play alert sound'));
        }

        function requestStreamStatus() {
            socket.emit('request_stream_status');
        }

        function updateSystemStats(stats) {
            const statsHtml = `
                <div class="row text-center">
                    <div class="col-6">
                        <div class="border rounded p-2">
                            <h6 class="mb-1">${stats.active_streams}</h6>
                            <small>Active Streams</small>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="border rounded p-2">
                            <h6 class="mb-1">${stats.queue_size}</h6>
                            <small>Queue Size</small>
                        </div>
                    </div>
                </div>
                <div class="mt-2 text-center">
                    <small class="text-muted">AI Engine: ${stats.ai_engine}</small>
                </div>
            `;
            document.getElementById('system-stats').innerHTML = statsHtml;
        }

        function showNotification(message, type) {
            // Simple notification - you can enhance this
            const alertClass = `alert-${type}`;
            const notification = document.createElement('div');
            notification.className = `alert ${alertClass} alert-dismissible fade show position-fixed`;
            notification.style.cssText = 'top: 20px; right: 20px; z-index: 9999; min-width: 300px;';
            notification.innerHTML = `
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                if (notification.parentNode) {
                    notification.parentNode.removeChild(notification);
                }
            }, 5000);
        }

        // Auto-refresh status every 10 seconds
        setInterval(requestStreamStatus, 10000);
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
